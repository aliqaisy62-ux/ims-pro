[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
