databases:
  - name: ims-pro-db
    databaseName: ims_pro
    user: imspro
    plan: free
    region: oregon

services:
  # ─── API (Express) ───────────────────────────────────────────────────────────
  - type: web
    name: ims-pro-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    preDeployCommand: npx prisma migrate deploy --schema /app/packages/db/prisma/schema.prisma
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ims-pro-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: EXCHANGE_RATE_IQD_USD
        value: "1480"
      - key: BACKUP_RETENTION_DAYS
        value: "30"
      - key: CORS_ORIGIN
        value: https://ims-pro-web.onrender.com

  # ─── Web (Next.js) ───────────────────────────────────────────────────────────
  - type: web
    name: ims-pro-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ims-pro-api.onrender.com
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
