version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ims-pro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-ims_pro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-pro-internal
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ims-pro-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-ims_pro}
      DIRECT_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-ims_pro}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required (comma-separated list of allowed origins)}
      SEED_DB: ${SEED_DB:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
    # No external port binding — API is only reachable via Nginx on port 80
    volumes:
      - ./uploads:/app/uploads
    networks:
      - ims-pro-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ims-pro-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_TELEMETRY_DISABLED: "1"
    # No external port binding — Web is only reachable via Nginx on port 80
    networks:
      - ims-pro-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: ims-pro-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - ims-pro-internal
      - ims-pro-edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  nginx_logs:

networks:
  # Internal network: no external internet access — DB, API, and Web communicate here.
  ims-pro-internal:
    driver: bridge
    internal: true
  # Edge network: Nginx uses this to receive incoming LAN traffic on port 80.
  ims-pro-edge:
    driver: bridge
