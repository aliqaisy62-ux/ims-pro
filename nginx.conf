worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ─────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens off;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml;

    # ─── Rate limit zones ────────────────────────────────────────────────────
    # login: 5 requests/min per IP  (matches Express limiter — defence in depth)
    # api:   30 requests/sec per IP (burst allowed)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;

    # ─── Upstreams ───────────────────────────────────────────────────────────
    upstream web {
        server web:3000;
        keepalive 16;
    }

    upstream api {
        server api:4000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size   10M;
        client_body_timeout    30s;
        client_header_timeout  30s;
        send_timeout           30s;

        # ─── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"                     always;
        add_header X-Content-Type-Options "nosniff"                        always;
        add_header X-XSS-Protection       "1; mode=block"                  always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        # ─── Login — strict rate limit ───────────────────────────────────────
        location = /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            proxy_pass             http://api;
            proxy_http_version     1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
        }

        # ─── API routes ──────────────────────────────────────────────────────
        location /api {
            limit_req zone=api burst=50 nodelay;

            proxy_pass             http://api;
            proxy_http_version     1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass                 $http_upgrade;
            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
        }

        # ─── Static assets — long-lived cache ───────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ─── Next.js app ─────────────────────────────────────────────────────
        location / {
            proxy_pass             http://web;
            proxy_http_version     1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass                 $http_upgrade;
            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
        }
    }
}
