<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 60%, #2563eb 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      user-select: none;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .tagline {
      font-size: 15px;
      opacity: 0.85;
      font-weight: 400;
    }

    .spinner-wrap {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .status {
      font-size: 13px;
      opacity: 0.65;
    }

    .version {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      opacity: 0.35;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">IMS-Pro</div>
  <div class="tagline">إيتانا — نظام إدارة المخزون ونقاط البيع</div>
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="status">جار تشغيل الخوادم...</div>
  </div>
  <span class="version">v1.0.0 · Windows</span>
</body>
</html>
